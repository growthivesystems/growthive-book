 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book an appointment — Growthive Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --navy:#0A1F44;
    --navy-deep:#071630;
    --blue:#2563EB;
    --blue-light:#EFF4FF;
    --amber:#F59E0B;
    --amber-deep:#D97706;
    --border:#E5E9F0;
    --text-muted:#6B7280;
    --text-faint:#9CA3AF;
    --danger:#DC2626;
    --danger-bg:#FEF2F2;
    --success:#059669;
    --success-bg:#ECFDF5;
    --cream:#FAF9F6;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Inter',Arial,sans-serif;
    background:var(--cream);
    margin:0;
    color:var(--navy);
  }
  .display{font-family:'Fraunces',Georgia,serif;}
  .hero{
    background:radial-gradient(120% 140% at 15% -10%, #10305F 0%, var(--navy) 45%, var(--navy-deep) 100%);
    color:#fff;
    padding:56px 24px 64px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";position:absolute;right:-120px;bottom:-160px;width:360px;height:360px;
    background:radial-gradient(circle, rgba(245,158,11,0.18), transparent 70%);border-radius:50%;
  }
  .hero-inner{max-width:640px;margin:0 auto;position:relative;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:18px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);}
  .hero h1{font-size:38px;line-height:1.12;margin:0 0 6px;font-weight:700;}
  .hero h1 .cat-emoji{font-size:32px;margin-right:10px;vertical-align:-4px;}
  .hero .tagline{
    font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:500;
    font-size:18px;color:rgba(255,255,255,0.78);margin:0 0 18px;
  }
  .hero .description{font-size:15px;line-height:1.6;color:rgba(255,255,255,0.72);max-width:480px;margin:0 0 26px;}
  .hero-meta{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:26px;}
  .meta-pill{
    display:flex;align-items:center;gap:7px;font-size:13.5px;color:rgba(255,255,255,0.85);
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);
    padding:8px 13px;border-radius:999px;
  }
  .social-row{display:flex;gap:10px;margin-bottom:30px;}
  .social-btn{
    width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.09);
    border:1px solid rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;
    color:#fff;text-decoration:none;transition:background .15s;
  }
  .social-btn:hover{background:rgba(255,255,255,0.18);}
  .social-btn svg{width:17px;height:17px;}
  .hero-ctas{display:flex;gap:12px;flex-wrap:wrap;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 26px;border-radius:11px;font-weight:700;font-size:14.5px;
    border:none;cursor:pointer;text-decoration:none;
  }
  .btn-amber{background:var(--amber);color:var(--navy-deep);}
  .btn-amber:hover{background:var(--amber-deep);color:#fff;}
  .btn-ghost-light{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.22);}
  .btn-ghost-light:hover{background:rgba(255,255,255,0.16);}
  .page-shell{max-width:640px;margin:0 auto;padding:0 20px 80px;}
  .section-intro{padding:44px 4px 22px;text-align:center;}
  .section-intro h2{font-size:24px;margin:0 0 8px;}
  .section-intro p{color:var(--text-muted);font-size:14.5px;margin:0;}
  .gallery-card{
    background:#fff;border:1px dashed var(--border);border-radius:16px;padding:26px;margin-bottom:8px;
    text-align:center;color:var(--text-faint);
  }
  .gallery-card .g-icon{font-size:26px;margin-bottom:8px;}
  .gallery-card p{font-size:13.5px;margin:0;}
  .service-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .service-card{
    display:flex;justify-content:space-between;align-items:center;gap:14px;
    background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;
    cursor:pointer;transition:border-color .15s, box-shadow .15s, transform .1s;
  }
  .service-card:hover{border-color:var(--amber-deep);box-shadow:0 4px 18px rgba(10,31,68,0.06);}
  .service-card.selected{border-color:var(--navy);background:var(--blue-light);}
  .service-card .svc-icon{
    width:44px;height:44px;border-radius:11px;background:var(--blue-light);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:20px;
  }
  .service-card.selected .svc-icon{background:#fff;}
  .service-card .svc-main{flex:1;}
  .service-card .svc-name{font-weight:700;font-size:15px;}
  .service-card .svc-duration{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
  .service-card .svc-price{font-weight:800;color:var(--navy);font-size:16px;white-space:nowrap;}
  .svc-add-row{display:flex;justify-content:flex-end;margin-top:10px;}
  .svc-add-btn{
    padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;
    border:1.5px solid var(--navy);background:#fff;color:var(--navy);
  }
  .svc-add-btn:hover{background:var(--navy);color:#fff;}
  .svc-add-btn.added{background:var(--success-bg);border-color:var(--success);color:var(--success);}
  .cart-summary{background:#fff;border:1.5px solid var(--navy);border-radius:14px;padding:18px 20px;margin-top:16px;display:none;}
  .cart-summary.visible{display:block;}
  .cart-summary h3{font-size:14px;margin:0 0 12px;}
  .cart-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .cart-row:last-of-type{border-bottom:none;}
  .cart-row .cart-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;font-weight:600;}
  .cart-total{display:flex;justify-content:space-between;font-weight:800;font-size:15px;margin-top:12px;padding-top:12px;border-top:2px solid var(--border);}
  .cart-continue-btn{width:100%;margin-top:16px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:20px;}
  .card h2{font-size:16px;margin:0 0 4px;}
  .card .step-hint{font-size:13px;color:var(--text-muted);margin:0 0 18px;}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;margin-top:16px;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=tel], input[type=email], input[type=date]{
    width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;
    font-size:14px;font-family:inherit;color:var(--navy);background:#fff;
  }
  input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
  @media(max-width:480px){.slot-grid{grid-template-columns:repeat(2,1fr);}}
  .slot-btn{
    padding:10px 6px;border:1.5px solid var(--border);border-radius:9px;background:#fff;
    font-size:13px;font-weight:700;cursor:pointer;color:var(--navy);
  }
  .slot-btn:hover{border-color:var(--amber-deep);}
  .slot-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
  .slot-empty{font-size:13.5px;color:var(--text-faint);padding:8px 0;}
  .btn-primary{background:var(--navy);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--navy-deep);}
  .btn-primary:disabled{background:#A9C2F5;cursor:not-allowed;}
  .banner{padding:14px 16px;border-radius:10px;font-size:13.5px;margin-bottom:20px;display:none;}
  .banner.error{background:var(--danger-bg);color:var(--danger);}
  .state-message{text-align:center;padding:100px 20px;color:var(--text-muted);font-size:14.5px;}
  .confirm-icon{
    width:56px;height:56px;border-radius:50%;background:var(--success-bg);color:var(--success);
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px;
  }
  .whatsapp-note{margin-top:16px;font-size:13px;color:var(--text-muted);text-align:center;}
</style>
</head>
<body>

<div id="pageRoot">
  <div class="state-message">Loading booking page...</div>
</div>

<script>
  emailjs.init({ publicKey: "-O4kpnRLdtYruuZga" });

  const sb = supabaseClient;

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('b');

  const root = document.getElementById('pageRoot');

  let business = null;
  let services = [];
  let cart = [];
  let selectedDate = null;
  let selectedTime = null;
  let loggedInCustomer = null;

  const DAY_INDEX_TO_NAME = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const CATEGORY_ICON = {
    "Hair Salon": "💇‍♀️",
    "Barbershop": "💈",
    "Lash & Nail Tech": "💅",
    "Makeup Artist": "💄",
    "Spa & Wellness": "🧖‍♀️",
    "Fitness & Personal Training": "🏋️",
    "Medical & Health Clinic": "🩺",
    "Photography & Events": "📸",
    "Home Cleaning Services": "🧹",
    "Tutoring & Consulting": "📚",
    "Auto Repair & Detailing": "🚗"
  };
  function categoryIcon(cat){ return CATEGORY_ICON[cat] || "✨"; }

  const ICONS = {
    instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg>`,
    facebook: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 21v-8h2.7l.4-3.1h-3.1V8c0-.9.25-1.5 1.55-1.5H17V3.7C16.7 3.65 15.7 3.5 14.5 3.5c-2.5 0-4.2 1.5-4.2 4.3v2.1H7.6V13h2.7v8h3.2z"/></svg>`,
    tiktok: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.7 3c.4 2.1 1.7 3.6 3.8 3.9v2.6c-1.4 0-2.7-.4-3.8-1.2v6.2c0 3.1-2.2 5.5-5.4 5.5-3.1 0-5.4-2.4-5.4-5.4 0-3 2.3-5.4 5.4-5.4.3 0 .6 0 .9.1v2.7c-.3-.1-.6-.2-.9-.2-1.5 0-2.6 1.2-2.6 2.7 0 1.5 1.1 2.7 2.6 2.7 1.6 0 2.8-1.2 2.8-2.8V3h2.6z"/></svg>`,
    website: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>`,
    whatsapp: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.4c1.4.8 3.1 1.2 4.8 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3.1.8.8-3-.2-.3C4 14.9 3.6 13.5 3.6 12c0-4.6 3.8-8.4 8.4-8.4s8.4 3.8 8.4 8.4-3.8 8.2-8.4 8.2zm4.6-6.1c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.2-.7.8-.8 1-.2.2-.3.2-.5.1-.2-.1-1-.4-1.9-1.2-.7-.6-1.2-1.4-1.3-1.6-.1-.2 0-.4.1-.5.1-.1.2-.3.4-.4.1-.1.2-.2.2-.4.1-.1 0-.3 0-.4-.1-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 1.9 0 1.1.8 2.2.9 2.4.1.2 1.6 2.5 4 3.5.6.2 1 .4 1.3.5.6.2 1.1.2 1.5.1.5-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.1-1.2-.1-.1-.2-.2-.4-.3z"/></svg>`
  };

  function socialLinks(biz){
    const links = [];
    if (biz.instagram) links.push({ key:'instagram', href: toUrl(biz.instagram, 'instagram.com') });
    if (biz.facebook) links.push({ key:'facebook', href: toUrl(biz.facebook, 'facebook.com') });
    if (biz.tiktok) links.push({ key:'tiktok', href: toUrl(biz.tiktok, 'tiktok.com') });
    if (biz.website) links.push({ key:'website', href: biz.website.startsWith('http') ? biz.website : 'https://' + biz.website });
    if (biz.whatsapp) links.push({ key:'whatsapp', href: 'https://wa.me/' + biz.whatsapp.replace(/[^0-9]/g,'') });
    return links;
  }
  function toUrl(handle, domain){
    if (handle.startsWith('http')) return handle;
    const clean = handle.replace('@','').trim();
    return `https://${domain}/${clean}`;
  }

  async function init(){
    if (!slug){
      root.innerHTML = `<div class="state-message">This booking link is missing a business reference. Please double check the link you were given.</div>`;
      return;
    }

    const { data: biz, error: bizError } = await sb
      .from('businesses')
      .select('*')
      .eq('slug', slug)
      .maybeSingle();

    if (bizError || !biz){
      root.innerHTML = `<div class="state-message">We couldn't find this business. The link may be incorrect or the page may have been removed.</div>`;
      return;
    }
    business = biz;

    const { data: svcs, error: svcError } = await sb
      .from('services')
      .select('*')
      .eq('business_id', business.id)
      .order('name');

    if (svcError){
      root.innerHTML = `<div class="state-message">Something went wrong loading this business's services. Please try again shortly.</div>`;
      return;
    }
    services = svcs || [];

    const customerToken = localStorage.getItem('customer_session_token');
    if (customerToken){
      const { data: sessionRows } = await sb.rpc('customer_session_check', { p_token: customerToken });
      if (sessionRows && sessionRows.length > 0){
        loggedInCustomer = sessionRows[0];
      }
    }

    // If this customer just came back from signing up/logging in mid-booking,
    // finish that booking automatically instead of making them start over.
    const pendingRaw = sessionStorage.getItem('pendingBooking');
    if (pendingRaw && loggedInCustomer){
      try {
        const pending = JSON.parse(pendingRaw);
        if (pending.slug === slug){
          const matchedService = services.find(s => s.id === pending.serviceId);
          if (matchedService){
            selectedService = matchedService;
            selectedDate = pending.date;
            selectedTime = pending.time;
            render();
            await finalizeBooking(pending.name, pending.phone, pending.email);
            return;
          }
        }
      } catch (e){
        sessionStorage.removeItem('pendingBooking');
      }
    }

    render();
  }

  function render(){
    const links = socialLinks(business);
    const location = [business.city, business.country].filter(Boolean).join(', ');

    root.innerHTML = `
      <div class="hero">
        <div class="hero-inner">
          <div class="eyebrow"><span class="dot"></span> Now accepting bookings</div>
          <h1 class="display"><span class="cat-emoji">${categoryIcon(business.category)}</span>${escapeHtml(business.business_name)}</h1>
          <p class="tagline">Welcome — we'd love to take care of you.</p>
          ${business.description ? `<p class="description">${escapeHtml(business.description)}</p>` : ''}

          <div class="hero-meta">
            ${business.category ? `<div class="meta-pill">${escapeHtml(business.category)}</div>` : ''}
            ${location ? `<div class="meta-pill">📍 ${escapeHtml(location)}</div>` : ''}
            ${business.phone ? `<div class="meta-pill">📞 ${escapeHtml(business.phone)}</div>` : ''}
          </div>

          ${links.length ? `
            <div class="social-row">
              ${links.map(l => `<a class="social-btn" href="${l.href}" target="_blank" rel="noopener">${ICONS[l.key]}</a>`).join('')}
            </div>
          ` : ''}

          <div class="hero-ctas">
            <a href="#booking-flow" class="btn btn-amber">Book an appointment →</a>
            ${business.whatsapp ? `<a href="https://wa.me/${business.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" rel="noopener" class="btn btn-ghost-light">Chat on WhatsApp</a>` : ''}
          </div>
        </div>
      </div>

      <div class="page-shell">

        <div class="gallery-card">
          <div class="g-icon">🖼️</div>
          <p>Photos of our work are coming soon to this page.</p>
        </div>

        <div class="section-intro" id="booking-flow">
          <h2 class="display">How may we serve you today?</h2>
          <p>Pick a service below to get started — it only takes a minute.</p>
        </div>

        <div class="banner error" id="errorBanner"></div>

        <div class="service-grid" id="servicesList"></div>

        <div class="card" id="dateTimeCard" style="display:none; margin-top:20px;">
          <h2>Pick a date & time</h2>
          <p class="step-hint">Only real open slots are shown below.</p>
          <label>Date</label>
          <input type="date" id="dateInput">
          <label>Available times</label>
          <div class="slot-grid" id="slotGrid"></div>
        </div>

        <div class="card" id="detailsCard" style="display:none;">
          <h2>Your details</h2>
          <p class="step-hint">So we know who's booking, and how to reach you.</p>
          ${loggedInCustomer ? `
            <div style="background:var(--blue-light);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13.5px;display:flex;justify-content:space-between;align-items:center;gap:10px;">
              <span>Booking as <b>${escapeHtml(loggedInCustomer.full_name)}</b></span>
              <a href="my-bookings.html" style="color:var(--blue);font-weight:600;text-decoration:none;">My bookings →</a>
            </div>
          ` : `
            <div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13.5px;color:#92400E;">
              You can fill this in as a guest, but you'll need a free account to finish booking — it just takes a minute, and we'll bring you right back here.
            </div>
          `}
          <label>Full name *</label>
          <input type="text" id="customerName" placeholder="Your name" value="${loggedInCustomer ? escapeHtml(loggedInCustomer.full_name) : ''}">
          <label>Phone number *</label>
          <input type="tel" id="customerPhone" placeholder="080..." value="${loggedInCustomer ? escapeHtml(loggedInCustomer.phone) : ''}">
          <label>Email (optional)</label>
          <input type="email" id="customerEmail" placeholder="you@example.com" value="${loggedInCustomer && loggedInCustomer.email ? escapeHtml(loggedInCustomer.email) : ''}">
          <div style="margin-top:22px;">
            <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()">${loggedInCustomer ? 'Confirm booking' : 'Continue to sign up & confirm'}</button>
          </div>
          ${business.whatsapp ? `<p class="whatsapp-note">Payment and final details are handled directly with ${escapeHtml(business.business_name)} on WhatsApp after booking.</p>` : ''}
        </div>

      </div>
    `;

    if (services.length === 0){
      document.getElementById('servicesList').innerHTML =
        `<div class="slot-empty" style="text-align:center;">This business hasn't added any services yet. Reach out to them directly using the details above.</div>`;
      return;
    }

    const list = document.getElementById('servicesList');
    services.forEach(s => {
      const el = document.createElement('div');
      el.className = 'service-card';
      el.innerHTML = `
        <div class="svc-icon">${categoryIcon(business.category)}</div>
        <div class="svc-main">
          <div class="svc-name">${escapeHtml(s.name)}</div>
          <div class="svc-duration">${s.duration_minutes} min</div>
        </div>
        <div class="svc-price">₦${Number(s.price).toLocaleString()}</div>
      `;
      el.addEventListener('click', () => selectService(s, el));
      list.appendChild(el);
    });

    document.getElementById('dateInput').min = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').addEventListener('change', onDateChange);
  }

  function selectService(service, el){
    selectedService = service;
    document.querySelectorAll('.service-card').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('dateTimeCard').style.display = 'block';
    document.getElementById('detailsCard').style.display = 'none';
    selectedTime = null;
    document.getElementById('slotGrid').innerHTML = '';
    document.getElementById('dateTimeCard').scrollIntoView({ behavior:'smooth', block:'start' });
    if (selectedDate) onDateChange();
  }

  async function onDateChange(){
    const dateVal = document.getElementById('dateInput').value;
    selectedDate = dateVal;
    selectedTime = null;
    const grid = document.getElementById('slotGrid');
    grid.innerHTML = '';

    if (!dateVal || !selectedService){
      return;
    }

    const dayName = DAY_INDEX_TO_NAME[new Date(dateVal + 'T00:00:00').getDay()];
    const workingDays = business.working_days || [];
    const hours = (business.opening_hours || {})[dayName];

    if (!workingDays.includes(dayName) || !hours){
      grid.innerHTML = `<div class="slot-empty">Closed on this day. Please pick another date.</div>`;
      return;
    }

    const interval = business.appointment_interval_minutes || 30;
    const slots = [];
    let [oh, om] = hours.open.split(':').map(Number);
    let [ch, cm] = hours.close.split(':').map(Number);
    let cursor = oh * 60 + om;
    const closeMinutes = ch * 60 + cm;

    while (cursor + selectedService.duration_minutes <= closeMinutes){
      const h = Math.floor(cursor / 60).toString().padStart(2, '0');
      const m = (cursor % 60).toString().padStart(2, '0');
      slots.push(`${h}:${m}`);
      cursor += interval;
    }

    const { data: existingBookings } = await sb
      .from('bookings')
      .select('booking_time')
      .eq('business_id', business.id)
      .eq('booking_date', dateVal)
      .neq('status', 'cancelled');

    const takenTimes = new Set((existingBookings || []).map(b => b.booking_time.slice(0,5)));
    const availableSlots = slots.filter(s => !takenTimes.has(s));

    if (availableSlots.length === 0){
      grid.innerHTML = `<div class="slot-empty">No available times left on this date. Please try another date.</div>`;
      return;
    }

    availableSlots.forEach(time => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'slot-btn';
      btn.textContent = time;
      btn.addEventListener('click', () => {
        selectedTime = time;
        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const detailsCard = document.getElementById('detailsCard');
        detailsCard.style.display = 'block';
        detailsCard.scrollIntoView({ behavior:'smooth', block:'start' });
      });
      grid.appendChild(btn);
    });
  }

  async function submitBooking(){
    const errorBanner = document.getElementById('errorBanner');
    errorBanner.style.display = 'none';

    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const email = document.getElementById('customerEmail').value.trim();

    if (!selectedService || !selectedDate || !selectedTime){
      showBookingError('Please choose a service, date, and time first.');
      return;
    }
    if (!name || !phone){
      showBookingError('Please enter your name and phone number.');
      return;
    }

    // Booking can only be finalized by a signed-in customer. If not logged in,
    // save everything picked so far and send them to create an account —
    // they'll land right back here with the booking completed automatically.
    if (!loggedInCustomer){
      sessionStorage.setItem('pendingBooking', JSON.stringify({
        slug, serviceId: selectedService.id, date: selectedDate, time: selectedTime,
        name, phone, email
      }));
      const returnUrl = window.location.href;
      window.location.href = 'customer-register.html?return=' + encodeURIComponent(returnUrl);
      return;
    }

    await finalizeBooking(name, phone, email);
  }

  async function finalizeBooking(name, phone, email){
    const btn = document.getElementById('submitBtn');
    if (btn){
      btn.disabled = true;
      btn.textContent = 'Booking...';
    }

    const status = business.booking_approval === 'manual' ? 'pending' : 'confirmed';

    const { error } = await sb.from('bookings').insert({
      business_id: business.id,
      service_id: selectedService.id,
      customer_id: loggedInCustomer ? loggedInCustomer.customer_id : null,
      customer_name: name,
      customer_phone: phone,
      customer_email: email || null,
      booking_date: selectedDate,
      booking_time: selectedTime,
      status: status
    });

    if (error){
      showBookingError('That slot was just taken, or something went wrong: ' + error.message + '. Please pick another time.');
      if (btn){
        btn.disabled = false;
        btn.textContent = 'Confirm booking';
      }
      return;
    }

    sessionStorage.removeItem('pendingBooking');

    // Send the customer a confirmation email directly from the browser via EmailJS.
    // This runs independently of the booking save above — if it fails for any
    // reason, we don't want to block or undo the booking itself, just log it.
    if (email) {
      emailjs.send("service_7fkvpur", "template_v14jq04", {
        email: email,
        appointment_date: selectedDate,
        appointment_time: selectedTime
      }).catch(err => console.error('Confirmation email failed to send:', err));
    }

    showConfirmation(status);
  }

  function showBookingError(msg){
    const errorBanner = document.getElementById('errorBanner');
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    errorBanner.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function showConfirmation(status){
    const message = status === 'pending'
      ? "Your request has been sent. The business will confirm it shortly."
      : "Your appointment is confirmed. See you then!";

    const waLink = business.whatsapp
      ? `https://wa.me/${business.whatsapp.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(`Hi! I just booked ${selectedService.name} on ${selectedDate} at ${selectedTime}. My name is ${document.getElementById('customerName') ? document.getElementById('customerName').value : ''}.`)}`
      : null;

    document.querySelector('.page-shell').innerHTML = `
      <div class="card" style="text-align:center;padding:40px 26px;">
        <div class="confirm-icon">✓</div>
        <h1 class="display" style="margin-bottom:8px;font-size:24px;">Booking received</h1>
        <p style="color:var(--text-muted);margin-bottom:4px;">${message}</p>
        <p style="color:var(--text-muted);font-size:13.5px;margin-bottom:24px;">
          ${escapeHtml(selectedService.name)} with ${escapeHtml(business.business_name)}<br>
          ${selectedDate} at ${selectedTime}
        </p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          ${waLink ? `<a href="${waLink}" target="_blank" rel="noopener" class="btn btn-primary" style="width:auto;">Message us on WhatsApp</a>` : ''}
          <a href="my-bookings.html" class="btn" style="width:auto;background:var(--blue-light);color:var(--navy);">View my bookings</a>
        </div>
      </div>
    `;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  init();
</script>
